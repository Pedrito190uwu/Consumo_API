<h1>Usuarios JSONPlaceholder</h1>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Usuario</th>
      <th>Correo</th>
      <th>Teléfono</th>
    </tr>
  </thead>

  <tbody>
    @for (usuario of usuarios; track usuario.id) {
      <tr>
        <td>{{ usuario.id }}</td>
        <td>{{ usuario.name }}</td>
        <td>{{ usuario.username }}</td>
        <td>{{ usuario.email }}</td>
        <td>{{ usuario.phone }}</td>
      </tr>
    }
  </tbody>
</table>
